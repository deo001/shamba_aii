name: shamba_ai
description: "ShambaAI — AI-Powered Agricultural Intelligence Platform for Smallholder Farmers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management & Navigation ──────────────────────────────────
  get: ^4.6.6

  # ── Firebase ────────────────────────────────────────────────────────
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.4.5

  # ── Local Storage (Offline-First) ───────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Location / Maps ─────────────────────────────────────────────────
  geolocator: ^13.0.4
  geocoding: ^3.0.0

  # ── Notifications ───────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Camera / Image ──────────────────────────────────────────────────
  camera: ^0.11.1
  image_picker: ^1.1.2

  # ── Networking ──────────────────────────────────────────────────────
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # ── UI Utilities ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  country_code_picker: ^3.0.0
  intl_phone_field: ^3.2.0
  pin_code_fields: ^8.0.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.4

  # ── Localization ────────────────────────────────────────────────────
  intl: ^0.20.2

  # ── Shared Preferences (lightweight KV) ─────────────────────────────
  shared_preferences: ^2.5.3

  # ── Permissions ─────────────────────────────────────────────────────
  permission_handler: ^11.4.0

  # ── App Utilities ───────────────────────────────────────────────────
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  generate: true  # Required for flutter_localizations ARB generation

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  # Fonts served via google_fonts package — no bundled font files needed
